# Use zsh as default
set -g default-shell /bin/zsh

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "tmux-256color" # Set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" # Override to enable true-color for compatible terminals

# General
set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 3200       # Increase history size (from 2,000)
set -g mouse off                # Disable mouse support
set -g status-interval 5        # Update the status bar every 5 seconds (default: 15 seconds)
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)

# Use vim arrow keys
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r h select-pane -L

bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1
bind -r C-h resize-pane -L 1

# Use `m` key to toggle maximize pane
bind -r m resize-pane -Z

# Enable vi mode to allow us to use vim keys to move around in copy mode (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Appearance
green="#00FF00"
cyan="#00FFFF"
red="#FF0000"
white="#FFFFFF"
black="#000000"
dark_gray="#3B4252"
set -g status-left-length 100
set -g status-style "fg=${white},bg=default"
set -g status-left "#[fg=${green},bold]#{?client_prefix,*, } [#S]#[fg=${white},nobold]  | "
set -g status-right "  [%H:%M %d-%m-%Y] "
set -g window-status-format " #I:#W"
set -g window-status-current-format " #[fg=${cyan},bold]*#[underscore]#I:#W"
set -g mode-style "fg=${black},bg=green"
set -g message-style "fg=${cyan},bg=default"
set -g pane-border-lines simple
set -g pane-border-style "fg=${dark_gray}"
set -g pane-active-border-style "fg=${white}"
